# git-cliff configuration — conventional commits changelog

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}\
{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/sandangel/a2a-cli/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9]+.[0-9]+.[0-9]+*"
ignore_tags = ".*-rc\\..*"
sort_commits = "newest"

commit_parsers = [
  { message = "^feat(\\(.+\\))?!|BREAKING CHANGE", group = "Breaking Changes" },
  { message = "^feat",                              group = "Features" },
  { message = "^fix",                               group = "Bug Fixes" },
  { message = "^perf",                              group = "Performance" },
  { message = "^refactor",                          group = "Refactoring" },
  # skip noise
  { message = "^chore|^docs|^style|^test|^ci|^build", skip = true },
]

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
