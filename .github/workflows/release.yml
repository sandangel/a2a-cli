# Release workflow for @rover/agent-cli
#
# Triggered manually: Actions → Release → Run workflow → choose "release" or "rc".
#
# Tagging rules:
#   rc      — tags HEAD of main as v{next}-rc.{N} (auto-increment)
#   release — retags the latest RC commit as v{next} (no new code enters)
#
# Changelog range (prev_tag → tag):
#   release      — latest stable release → new release tag
#   rc.1         — latest stable release → new rc tag
#   rc.N (N≥2)   — previous rc tag (rc.N-1) → new rc tag

name: Release

permissions:
  contents: write
  attestations: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - release
          - rc

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── plan ────────────────────────────────────────────────────────────────────
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag:        ${{ steps.meta.outputs.tag }}
      version:    ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      prev_tag:   ${{ steps.meta.outputs.prev_tag }}
      build_env:  ${{ steps.meta.outputs.build_env }}
      npm_tag:    ${{ steps.meta.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine version and push tag
        id: bump
        run: |
          NEXT=$(git-cliff --bumped-version 2>/dev/null | sed 's/^v//; s/-[a-zA-Z].*//')
          if [ -z "$NEXT" ]; then
            LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              # No tags yet and no bumpable commits — start at 0.1.0
              NEXT="0.1.0"
            else
              echo "::error::No releasable commits found since ${LATEST_TAG}"
              exit 1
            fi
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.release_type }}" = "release" ]; then
            # Retag the latest RC commit — no new code enters the release
            LATEST_RC=$(git tag -l "v${NEXT}-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              echo "::error::No RC tags found for v${NEXT}. Cut an RC first."
              exit 1
            fi
            RC_COMMIT=$(git rev-list -n1 "$LATEST_RC")
            TAG="v${NEXT}"
            git tag "$TAG" "$RC_COMMIT"
          else
            # RC: auto-increment, tag current HEAD
            LATEST_RC=$(git tag -l "v${NEXT}-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              N=1
            else
              N=$(echo "$LATEST_RC" | grep -oP '(?<=rc\.)\d+$')
              N=$((N + 1))
            fi
            TAG="v${NEXT}-rc.${N}"
            git tag "$TAG"
          fi

          git push origin "$TAG"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve metadata
        id: meta
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Latest stable = highest vX.Y.Z without a pre-release suffix
          LATEST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v '\-' | sort -V | grep -v "^${TAG}$" | tail -1)

          if [[ "$VERSION" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            BASE="${VERSION%-rc.*}"
            N="${VERSION##*-rc.}"
            if [ "$N" = "1" ]; then
              PREV="$LATEST_STABLE"
            else
              PREV="v${BASE}-rc.$((N - 1))"
            fi
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            PREV="$LATEST_STABLE"
          fi

          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *-rc.* ]]; then
            echo "build_env=stg" >> "$GITHUB_OUTPUT"
            echo "npm_tag=next"  >> "$GITHUB_OUTPUT"
          else
            echo "build_env=prod"   >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest"   >> "$GITHUB_OUTPUT"
          fi

          echo "resolved: tag=${TAG}, prev_tag=${PREV}"

  # ── build ───────────────────────────────────────────────────────────────────
  build:
    needs: plan
    uses: ./.github/workflows/build.yml
    with:
      build_env: ${{ needs.plan.outputs.build_env }}
      ref: ${{ needs.plan.outputs.tag }}
      upload_artifacts: true
      attest: true

  # ── release ─────────────────────────────────────────────────────────────────
  release:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          PREV="${{ needs.plan.outputs.prev_tag }}"
          if [ -n "$PREV" ]; then
            git-cliff --strip header "${PREV}..${TAG}" -o changelog-release.md
          else
            git-cliff --strip header --tag "${TAG}" -o changelog-release.md
          fi
          cat changelog-release.md

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.plan.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          TAG="${{ needs.plan.outputs.tag }}"
          sed "s|TAG|${TAG}|g" .github/release-header.md > release-notes.md
          cat changelog-release.md >> release-notes.md

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            artifacts/*

  # ── publish-npm ─────────────────────────────────────────────────────────────
  publish-npm:
    needs: [plan, release]
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{ needs.plan.outputs.version }}
      npm_tag: ${{ needs.plan.outputs.npm_tag }}
