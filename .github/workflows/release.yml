# Release workflow for @rover/agent-cli
#
# Two entry points:
#
#   1. workflow_dispatch — choose "release" or "rc".
#      The plan job uses git-cliff to detect the next semver from
#      conventional commits, then pushes the tag. The tag push
#      re-triggers this same workflow (entry point 2).
#
#   2. push: tag — builds platform binaries, generates a changelog
#      with git-cliff, creates a GitHub Release, and publishes to npm
#      (release tags only, not rc).

name: Release

permissions:
  contents: write
  attestations: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - release
          - rc
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── plan ──────────────────────────────────────────────────────────────────
  # On workflow_dispatch: determine next version, push tag, then exit.
  #   The tag push re-triggers this workflow at the "push: tags" entry point.
  # On tag push: extract version/prerelease/prev_tag from the tag name.
  #
  # Tagging rules:
  #   rc      — tag HEAD of main as v{next}-rc.{N} (auto-increment)
  #   release — retag the latest RC commit as v{next} (no new code)
  #
  # Changelog range (prev_tag → tag):
  #   release      — latest stable release → new release tag
  #   rc.1         — latest stable release → new rc tag
  #   rc.N (N≥2)   — previous rc tag (rc.N-1) → new rc tag
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag:        ${{ steps.meta.outputs.tag }}
      version:    ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      prev_tag:   ${{ steps.meta.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        if: github.event_name == 'workflow_dispatch'
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Bump version and push tag
        if: github.event_name == 'workflow_dispatch'
        id: bump
        run: |
          NEXT=$(git-cliff --bumped-version 2>/dev/null | sed 's/^v//')
          if [ -z "$NEXT" ]; then
            echo "::error::git-cliff could not determine next version — no conventional commits found since last tag"
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.release_type }}" = "release" ]; then
            # Retag the latest RC commit — no new code enters the release
            LATEST_RC=$(git tag -l "v${NEXT}-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              echo "::error::No RC tags found for v${NEXT}. Cut an RC first."
              exit 1
            fi
            RC_COMMIT=$(git rev-list -n1 "$LATEST_RC")
            TAG="v${NEXT}"
            git tag "$TAG" "$RC_COMMIT"
          else
            # RC: auto-increment, tag current HEAD
            LATEST_RC=$(git tag -l "v${NEXT}-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              N=1
            else
              N=$(echo "$LATEST_RC" | grep -oP '(?<=rc\.)\d+$')
              N=$((N + 1))
            fi
            TAG="v${NEXT}-rc.${N}"
            git tag "$TAG"
          fi

          git push origin "$TAG"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve tag metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ steps.bump.outputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Determine the previous tag for the changelog range
          # Latest stable = highest vX.Y.Z tag without a pre-release suffix
          LATEST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v '\-' | sort -V | grep -v "^${TAG}$" | tail -1)

          if [[ "$VERSION" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            BASE="${VERSION%-rc.*}"
            N="${VERSION##*-rc.}"
            if [ "$N" = "1" ]; then
              # First RC: diff against latest stable release
              PREV="$LATEST_STABLE"
            else
              # Subsequent RC: diff against previous RC
              PREV="v${BASE}-rc.$((N - 1))"
            fi
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            # Release: diff against latest stable release
            PREV="$LATEST_STABLE"
          fi

          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV}, tag=${TAG}"

  # ── build ─────────────────────────────────────────────────────────────────
  # Only runs on tag push (the workflow_dispatch run exits after plan).
  build:
    needs: plan
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: false

      - name: Checkout submodules (SSH → HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""  # don't treat warnings as errors in cross-compile targets

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p agc --locked
          else
            cargo build --release --target ${{ matrix.target }} -p agc --locked
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARTIFACT="agc-${{ matrix.target }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/agc" staging/
          cp LICENSE README.md staging/
          tar czf "${ARTIFACT}.tar.gz" -C staging .
          shasum -a 256 "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          $ARTIFACT = "agc-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $ARTIFACT
          Copy-Item "target/${{ matrix.target }}/release/agc.exe" "$ARTIFACT/"
          Copy-Item LICENSE, README.md "$ARTIFACT/"
          Compress-Archive -Path "$ARTIFACT/*" -DestinationPath "$ARTIFACT.zip"
          (Get-FileHash "$ARTIFACT.zip" -Algorithm SHA256).Hash.ToLower() + "  $ARTIFACT.zip" | Out-File -Encoding ascii "$ARTIFACT.zip.sha256"
        shell: pwsh

      - name: Attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: agc-${{ matrix.target }}.${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            agc-${{ matrix.target }}.${{ matrix.archive }}
            agc-${{ matrix.target }}.${{ matrix.archive }}.sha256

  # ── release ───────────────────────────────────────────────────────────────
  release:
    needs: [plan, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0   # git-cliff needs full history

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          PREV="${{ needs.plan.outputs.prev_tag }}"
          if [ -n "$PREV" ]; then
            git-cliff --strip header "${PREV}..${TAG}" -o changelog-release.md
          else
            git-cliff --strip header --tag "${TAG}" -o changelog-release.md
          fi
          cat changelog-release.md

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.plan.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Stamp the tag into the download URLs, then append the changelog
          TAG="${{ needs.plan.outputs.tag }}"
          sed "s|TAG|${TAG}|g" .github/release-header.md > release-notes.md
          cat changelog-release.md >> release-notes.md

          gh release create "${TAG}" \
            --target "${{ github.sha }}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            artifacts/*

  # ── publish-npm ───────────────────────────────────────────────────────────
  publish-npm:
    needs: [plan, release]
    if: github.event_name == 'push' && needs.plan.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://artifactory.stargate.toyota/artifactory/api/npm/rover-npm-release'
          scope: '@rover'

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Extract binaries into platform packages
        run: |
          VERSION="${{ needs.plan.outputs.version }}"

          # darwin-arm64
          mkdir -p npm/packages/@rover/agent-cli-darwin-arm64/bin
          tar xzf artifacts/agc-aarch64-apple-darwin.tar.gz -C npm/packages/@rover/agent-cli-darwin-arm64/bin ./agc
          chmod +x npm/packages/@rover/agent-cli-darwin-arm64/bin/agc

          # darwin-x64
          mkdir -p npm/packages/@rover/agent-cli-darwin-x64/bin
          tar xzf artifacts/agc-x86_64-apple-darwin.tar.gz -C npm/packages/@rover/agent-cli-darwin-x64/bin ./agc
          chmod +x npm/packages/@rover/agent-cli-darwin-x64/bin/agc

          # linux-arm64 (gnu)
          mkdir -p npm/packages/@rover/agent-cli-linux-arm64/bin
          tar xzf artifacts/agc-aarch64-unknown-linux-gnu.tar.gz -C npm/packages/@rover/agent-cli-linux-arm64/bin ./agc
          chmod +x npm/packages/@rover/agent-cli-linux-arm64/bin/agc

          # linux-x64 (gnu)
          mkdir -p npm/packages/@rover/agent-cli-linux-x64/bin
          tar xzf artifacts/agc-x86_64-unknown-linux-gnu.tar.gz -C npm/packages/@rover/agent-cli-linux-x64/bin ./agc
          chmod +x npm/packages/@rover/agent-cli-linux-x64/bin/agc

          # win32-x64
          mkdir -p npm/packages/@rover/agent-cli-win32-x64/bin
          unzip -j artifacts/agc-x86_64-pc-windows-msvc.zip "*/agc.exe" -d npm/packages/@rover/agent-cli-win32-x64/bin/

      - name: Set version in all packages
        run: |
          VERSION="${{ needs.plan.outputs.version }}"

          for pkg in npm npm/packages/@rover/agent-cli-darwin-arm64 npm/packages/@rover/agent-cli-darwin-x64 npm/packages/@rover/agent-cli-linux-arm64 npm/packages/@rover/agent-cli-linux-x64 npm/packages/@rover/agent-cli-win32-x64; do
            npm version --no-git-tag-version --prefix "$pkg" "$VERSION"
          done

          node -e "
            const fs = require('fs');
            const f = 'npm/package.json';
            const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
            for (const k in pkg.optionalDependencies) pkg.optionalDependencies[k] = process.argv[1];
            fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
          " "$VERSION"

      - name: Publish platform packages
        run: |
          for pkg in npm/packages/@rover/agent-cli-darwin-arm64 npm/packages/@rover/agent-cli-darwin-x64 npm/packages/@rover/agent-cli-linux-arm64 npm/packages/@rover/agent-cli-linux-x64 npm/packages/@rover/agent-cli-win32-x64; do
            npm publish "$pkg"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
