# Release workflow for @rover/a2a-cli
#
# Triggered manually: Actions → Release → Run workflow → choose "release" or "rc".
#
# Tagging rules:
#   rc      — tags HEAD of main as v{next}-rc.{N} (auto-increment)
#   release — retags the latest RC commit as v{next} (no new code enters)
#
# Changelog range (prev_tag → tag):
#   release      — latest stable release → new release tag
#   rc.1         — latest stable release → new rc tag
#   rc.N (N≥2)   — previous rc tag (rc.N-1) → new rc tag

name: Release

permissions:
  contents: write
  attestations: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - release
          - rc

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── plan ────────────────────────────────────────────────────────────────────
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      prev_tag: ${{ steps.meta.outputs.prev_tag }}
      build_env: ${{ steps.meta.outputs.build_env }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version and push tag
        id: bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.release_type }}" = "release" ]; then
            # Promote the latest RC to stable — version comes from the RC tag,
            # not from commit analysis (no new code enters a release).
            LATEST_RC=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              echo "::error::No RC tags found. Cut an RC first."
              exit 1
            fi
            # Strip -rc.N suffix to get the stable version
            NEXT="${LATEST_RC#v}"
            NEXT="${NEXT%-rc.*}"
            RC_COMMIT=$(git rev-list -n1 "$LATEST_RC")
            TAG="v${NEXT}"
            git tag "$TAG" "$RC_COMMIT"
          else
            # RC: compute next version from commits since the last stable tag.
            LATEST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
              | grep -v '\-' | sort -V | tail -1)
            LATEST_STABLE_VER="${LATEST_STABLE#v}"

            # Inspect commit subjects since the last stable tag to determine the
            # bump level. git-cliff --bumped-version is unreliable here: in v2.x
            # it treats RC tags in the range as "current" and returns no bump.
            RANGE="${LATEST_STABLE:+${LATEST_STABLE}..}HEAD"
            SUBJECTS=$(git log --format=%s ${RANGE})

            MAJOR=0; MINOR=0; PATCH=0
            while IFS= read -r msg; do
              if echo "$msg" | grep -qP '!(\(.+\))?:|\bBREAKING CHANGE\b'; then
                MAJOR=1
              elif echo "$msg" | grep -qP '^feat(\(.+\))?[!:]'; then
                MINOR=1
              elif echo "$msg" | grep -qP '^(fix|perf|refactor)(\(.+\))?[!:]'; then
                PATCH=1
              fi
            done <<< "$SUBJECTS"

            if [ -z "$LATEST_STABLE_VER" ]; then
              NEXT="0.1.0"
            else
              IFS='.' read -r MAJ MIN PAT <<< "$LATEST_STABLE_VER"
              if [ "$MAJOR" = "1" ]; then
                NEXT="$((MAJ + 1)).0.0"
              elif [ "$MINOR" = "1" ]; then
                NEXT="${MAJ}.$((MIN + 1)).0"
              elif [ "$PATCH" = "1" ]; then
                NEXT="${MAJ}.${MIN}.$((PAT + 1))"
              else
                NEXT="$LATEST_STABLE_VER"
              fi
            fi

            LATEST_RC=$(git tag -l "v${NEXT}-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              N=1
            else
              N=$(echo "$LATEST_RC" | grep -oP '(?<=rc\.)\d+$')
              N=$((N + 1))
            fi
            TAG="v${NEXT}-rc.${N}"
            git tag "$TAG"
          fi

          git push origin "$TAG"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve metadata
        id: meta
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Latest stable = highest vX.Y.Z without a pre-release suffix
          LATEST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v '\-' | sort -V | grep -v "^${TAG}$" | tail -1)

          if [[ "$VERSION" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            BASE="${VERSION%-rc.*}"
            N="${VERSION##*-rc.}"
            if [ "$N" = "1" ]; then
              PREV="$LATEST_STABLE"
            else
              PREV="v${BASE}-rc.$((N - 1))"
            fi
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            PREV="$LATEST_STABLE"
          fi

          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *-rc.* ]]; then
            echo "build_env=stg" >> "$GITHUB_OUTPUT"
            echo "npm_tag=next"  >> "$GITHUB_OUTPUT"
          else
            echo "build_env=prod"   >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest"   >> "$GITHUB_OUTPUT"
          fi

          echo "resolved: tag=${TAG}, prev_tag=${PREV}"

  # ── build ───────────────────────────────────────────────────────────────────
  build:
    needs: plan
    uses: ./.github/workflows/build.yml
    with:
      build_env: ${{ needs.plan.outputs.build_env }}
      ref: ${{ needs.plan.outputs.tag }}
      upload_artifacts: true
      attest: true

  # ── release ─────────────────────────────────────────────────────────────────
  release:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - name: Cache git-cliff binary
        id: cache-git-cliff-release
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/git-cliff
          key: git-cliff-${{ runner.os }}-${{ runner.arch }}

      - name: Install git-cliff
        if: steps.cache-git-cliff-release.outputs.cache-hit != 'true'
        run: cargo install git-cliff --locked

      - name: Generate changelog
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          PREV="${{ needs.plan.outputs.prev_tag }}"
          if [ -n "$PREV" ]; then
            git-cliff --strip header --tag "${TAG}" "${PREV}..${TAG}" -o changelog-release.md
          else
            git-cliff --strip header --tag "${TAG}" -o changelog-release.md
          fi
          cat changelog-release.md

      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.plan.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          TAG="${{ needs.plan.outputs.tag }}"
          sed "s|TAG|${TAG}|g" .github/release-header.md > release-notes.md
          cat changelog-release.md >> release-notes.md

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            artifacts/*

  # ── publish-npm ─────────────────────────────────────────────────────────────
  publish-npm:
    needs: [plan, release]
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{ needs.plan.outputs.version }}
      npm_tag: ${{ needs.plan.outputs.npm_tag }}
