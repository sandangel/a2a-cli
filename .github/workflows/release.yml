# Release workflow for @rover/agent-cli
#
# Triggered manually: Actions → Release → Run workflow → choose "release" or "rc".
#
# Tagging rules:
#   rc      — tags HEAD of main as v{next}-rc.{N} (auto-increment)
#   release — retags the latest RC commit as v{next} (no new code enters)
#
# Changelog range (prev_tag → tag):
#   release      — latest stable release → new release tag
#   rc.1         — latest stable release → new rc tag
#   rc.N (N≥2)   — previous rc tag (rc.N-1) → new rc tag

name: Release

permissions:
  contents: write
  attestations: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - release
          - rc

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── plan ────────────────────────────────────────────────────────────────────
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag:        ${{ steps.meta.outputs.tag }}
      version:    ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      prev_tag:   ${{ steps.meta.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine version and push tag
        id: bump
        run: |
          NEXT=$(git-cliff --bumped-version 2>/dev/null | sed 's/^v//')
          if [ -z "$NEXT" ]; then
            LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              # No tags yet and no bumpable commits — start at 0.1.0
              NEXT="0.1.0"
            else
              echo "::error::No releasable commits found since ${LATEST_TAG}"
              exit 1
            fi
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.release_type }}" = "release" ]; then
            # Retag the latest RC commit — no new code enters the release
            LATEST_RC=$(git tag -l "v${NEXT}-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              echo "::error::No RC tags found for v${NEXT}. Cut an RC first."
              exit 1
            fi
            RC_COMMIT=$(git rev-list -n1 "$LATEST_RC")
            TAG="v${NEXT}"
            git tag "$TAG" "$RC_COMMIT"
          else
            # RC: auto-increment, tag current HEAD
            LATEST_RC=$(git tag -l "v${NEXT}-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              N=1
            else
              N=$(echo "$LATEST_RC" | grep -oP '(?<=rc\.)\d+$')
              N=$((N + 1))
            fi
            TAG="v${NEXT}-rc.${N}"
            git tag "$TAG"
          fi

          git push origin "$TAG"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve metadata
        id: meta
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Latest stable = highest vX.Y.Z without a pre-release suffix
          LATEST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v '\-' | sort -V | grep -v "^${TAG}$" | tail -1)

          if [[ "$VERSION" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            BASE="${VERSION%-rc.*}"
            N="${VERSION##*-rc.}"
            if [ "$N" = "1" ]; then
              PREV="$LATEST_STABLE"
            else
              PREV="v${BASE}-rc.$((N - 1))"
            fi
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            PREV="$LATEST_STABLE"
          fi

          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "resolved: tag=${TAG}, prev_tag=${PREV}"

  # ── build ───────────────────────────────────────────────────────────────────
  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ needs.plan.outputs.tag }}   # build from tagged commit
          submodules: false

      - name: Checkout submodules (SSH → HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p agc --locked
          else
            cargo build --release --target ${{ matrix.target }} -p agc --locked
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARTIFACT="agc-${{ matrix.target }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/agc" staging/
          cp LICENSE README.md staging/
          tar czf "${ARTIFACT}.tar.gz" -C staging .
          shasum -a 256 "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          $ARTIFACT = "agc-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $ARTIFACT
          Copy-Item "target/${{ matrix.target }}/release/agc.exe" "$ARTIFACT/"
          Copy-Item LICENSE, README.md "$ARTIFACT/"
          Compress-Archive -Path "$ARTIFACT/*" -DestinationPath "$ARTIFACT.zip"
          (Get-FileHash "$ARTIFACT.zip" -Algorithm SHA256).Hash.ToLower() + "  $ARTIFACT.zip" | Out-File -Encoding ascii "$ARTIFACT.zip.sha256"
        shell: pwsh

      - name: Attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: agc-${{ matrix.target }}.${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            agc-${{ matrix.target }}.${{ matrix.archive }}
            agc-${{ matrix.target }}.${{ matrix.archive }}.sha256

  # ── release ─────────────────────────────────────────────────────────────────
  release:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          PREV="${{ needs.plan.outputs.prev_tag }}"
          if [ -n "$PREV" ]; then
            git-cliff --strip header "${PREV}..${TAG}" -o changelog-release.md
          else
            git-cliff --strip header --tag "${TAG}" -o changelog-release.md
          fi
          cat changelog-release.md

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.plan.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          TAG="${{ needs.plan.outputs.tag }}"
          sed "s|TAG|${TAG}|g" .github/release-header.md > release-notes.md
          cat changelog-release.md >> release-notes.md

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            artifacts/*

  # ── publish-npm ─────────────────────────────────────────────────────────────
  publish-npm:
    needs: [plan, release]
    if: needs.plan.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Authenticate to Artifactory
        id: auth
        uses: sg-innersource/artifactory-oidc-access@v2.0.12

      - name: Configure npm registry
        run: |
          REGISTRY="https://jp1-artifactory.stargate.toyota/artifactory/api/npm/rover-npm-release/"
          npm config set @rover:registry "${REGISTRY}"
          npm config set "${REGISTRY}:_authToken" "${{ steps.auth.outputs.artifactory-token }}"

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Extract binaries into platform packages
        run: |
          VERSION="${{ needs.plan.outputs.version }}"

          mkdir -p npm/packages/@rover/agent-cli-darwin-arm64/bin
          tar xzf artifacts/agc-aarch64-apple-darwin.tar.gz -C npm/packages/@rover/agent-cli-darwin-arm64/bin ./agc
          chmod +x npm/packages/@rover/agent-cli-darwin-arm64/bin/agc

          mkdir -p npm/packages/@rover/agent-cli-darwin-x64/bin
          tar xzf artifacts/agc-x86_64-apple-darwin.tar.gz -C npm/packages/@rover/agent-cli-darwin-x64/bin ./agc
          chmod +x npm/packages/@rover/agent-cli-darwin-x64/bin/agc

          mkdir -p npm/packages/@rover/agent-cli-linux-arm64/bin
          tar xzf artifacts/agc-aarch64-unknown-linux-gnu.tar.gz -C npm/packages/@rover/agent-cli-linux-arm64/bin ./agc
          chmod +x npm/packages/@rover/agent-cli-linux-arm64/bin/agc

          mkdir -p npm/packages/@rover/agent-cli-linux-x64/bin
          tar xzf artifacts/agc-x86_64-unknown-linux-gnu.tar.gz -C npm/packages/@rover/agent-cli-linux-x64/bin ./agc
          chmod +x npm/packages/@rover/agent-cli-linux-x64/bin/agc

          mkdir -p npm/packages/@rover/agent-cli-win32-x64/bin
          unzip -j artifacts/agc-x86_64-pc-windows-msvc.zip "*/agc.exe" -d npm/packages/@rover/agent-cli-win32-x64/bin/

      - name: Set version in all packages
        run: |
          VERSION="${{ needs.plan.outputs.version }}"

          for pkg in npm npm/packages/@rover/agent-cli-darwin-arm64 npm/packages/@rover/agent-cli-darwin-x64 npm/packages/@rover/agent-cli-linux-arm64 npm/packages/@rover/agent-cli-linux-x64 npm/packages/@rover/agent-cli-win32-x64; do
            npm version --no-git-tag-version --prefix "$pkg" "$VERSION"
          done

          node -e "
            const fs = require('fs');
            const f = 'npm/package.json';
            const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
            for (const k in pkg.optionalDependencies) pkg.optionalDependencies[k] = process.argv[1];
            fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
          " "$VERSION"

      - name: Publish platform packages
        run: |
          for pkg in npm/packages/@rover/agent-cli-darwin-arm64 npm/packages/@rover/agent-cli-darwin-x64 npm/packages/@rover/agent-cli-linux-arm64 npm/packages/@rover/agent-cli-linux-x64 npm/packages/@rover/agent-cli-win32-x64; do
            npm publish "$pkg"
          done

      - name: Publish main package
        working-directory: npm
        run: npm publish
