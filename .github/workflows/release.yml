# Release workflow for a2a-cli
#
# Triggered manually from main: Actions → Release → Run workflow
#
# RC flow:
#   1. Recreate release/candidate from the latest stable release tag
#   2. Merge main → release/candidate, or cherry-pick specific commits if provided
#   3. Compute version bump from commits on release/candidate since last stable tag
#   4. Tag HEAD of release/candidate as v{next}-rc.{N} (auto-increment)
#
# Release flow (release_type=release):
#   Promote the latest RC tag to stable — no new code enters.
#
# Changelog range (prev_tag → tag):
#   release      — latest stable release → new release tag
#   rc.1         — latest stable release → new rc tag
#   rc.N (N≥2)   — previous rc tag (rc.N-1) → new rc tag

name: Release

run-name: "Release (${{ inputs.release_type || 'rc' }})"

permissions:
  contents: write
  attestations: write
  id-token: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        default: rc
        type: choice
        options:
          - rc
          - release
      commits:
        description: "Commits to cherry-pick from main (comma-separated SHAs). Leave empty to merge all of main."
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── plan ────────────────────────────────────────────────────────────────────
  plan:
    runs-on: ubuntu-latest
    environment: release
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      prev_tag: ${{ steps.meta.outputs.prev_tag }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare release/candidate branch
        if: inputs.release_type == 'rc'
        run: |
          # Delete existing release/candidate if present
          if git ls-remote --exit-code origin refs/heads/release/candidate; then
            git push origin --delete release/candidate
          fi

          # Base: latest stable release tag; fall back to root commit if none
          LATEST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v '\-' | sort -V | tail -1)
          if [ -n "$LATEST_STABLE" ]; then
            BASE_COMMIT=$(git rev-list -n1 "$LATEST_STABLE")
          else
            BASE_COMMIT=$(git rev-list --max-parents=0 HEAD)
          fi

          git checkout -b release/candidate "$BASE_COMMIT"

          COMMITS="${{ inputs.commits }}"
          if [ -n "$COMMITS" ]; then
            # Cherry-pick the requested commits from main
            echo "$COMMITS" | tr ',' '\n' | sed 's/[[:space:]]//g' | while read -r sha; do
              [ -n "$sha" ] && git cherry-pick "$sha"
            done
          else
            git merge --no-edit origin/main
          fi

          git push origin release/candidate

      - name: Compute version and push tag
        id: tag
        run: |
          if [ "${{ inputs.release_type }}" = "release" ]; then
            # Promote the latest RC to stable — version comes from the RC tag,
            # not from commit analysis (no new code enters a release).
            LATEST_RC=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              echo "::error::No RC tags found. Cut an RC first."
              exit 1
            fi
            NEXT="${LATEST_RC#v}"
            NEXT="${NEXT%-rc.*}"
            RC_COMMIT=$(git rev-list -n1 "$LATEST_RC")
            TAG="v${NEXT}"
            git tag "$TAG" "$RC_COMMIT"
          else
            # RC: HEAD is now release/candidate — compute bump from commits
            # since the last stable tag.
            LATEST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
              | grep -v '\-' | sort -V | tail -1)
            LATEST_STABLE_VER="${LATEST_STABLE#v}"

            RANGE="${LATEST_STABLE:+${LATEST_STABLE}..}HEAD"
            SUBJECTS=$(git log --format=%s ${RANGE})

            MAJOR=0; MINOR=0; PATCH=0
            while IFS= read -r msg; do
              if echo "$msg" | grep -qP '!(\(.+\))?:|\bBREAKING CHANGE\b'; then
                MAJOR=1
              elif echo "$msg" | grep -qP '^feat(\(.+\))?[!:]'; then
                MINOR=1
              elif echo "$msg" | grep -qP '^(fix|perf|refactor)(\(.+\))?[!:]'; then
                PATCH=1
              fi
            done <<< "$SUBJECTS"

            if [ -z "$LATEST_STABLE_VER" ]; then
              NEXT="0.1.0"
            else
              IFS='.' read -r MAJ MIN PAT <<< "$LATEST_STABLE_VER"
              if [ "$MAJOR" = "1" ]; then
                NEXT="$((MAJ + 1)).0.0"
              elif [ "$MINOR" = "1" ]; then
                NEXT="${MAJ}.$((MIN + 1)).0"
              elif [ "$PATCH" = "1" ]; then
                NEXT="${MAJ}.${MIN}.$((PAT + 1))"
              else
                NEXT="$LATEST_STABLE_VER"
              fi
            fi

            LATEST_RC=$(git tag -l "v${NEXT}-rc.*" | sort -V | tail -1)
            if [ -z "$LATEST_RC" ]; then
              N=1
            else
              N=$(echo "$LATEST_RC" | grep -oP '(?<=rc\.)\d+$')
              N=$((N + 1))
            fi
            TAG="v${NEXT}-rc.${N}"
            git tag "$TAG"
          fi

          git push origin "$TAG"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve metadata
        id: meta
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Latest stable = highest vX.Y.Z without a pre-release suffix
          LATEST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v '\-' | sort -V | grep -v "^${TAG}$" | tail -1)

          if [[ "$VERSION" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            BASE="${VERSION%-rc.*}"
            N="${VERSION##*-rc.}"
            if [ "$N" = "1" ]; then
              PREV="$LATEST_STABLE"
            else
              PREV="v${BASE}-rc.$((N - 1))"
            fi
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            PREV="$LATEST_STABLE"
          fi

          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *-rc.* ]]; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

          echo "resolved: tag=${TAG}, prev_tag=${PREV}"

      - name: Write job summary
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TYPE="${{ inputs.release_type }}"
          {
            echo "## Release: \`${TAG}\`"
            echo "**Type:** ${TYPE}"
            echo "**Prev tag:** ${{ steps.meta.outputs.prev_tag || '(none)' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── build ───────────────────────────────────────────────────────────────────
  build:
    needs: plan
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.plan.outputs.tag }}
      upload_artifacts: true
      attest: true

  # ── rust-crates ──────────────────────────────────────────────────────────────
  publish-crates:
    needs: plan
    uses: ./.github/workflows/publish-crates.yml
    with:
      ref: ${{ needs.plan.outputs.tag }}
      version: ${{ needs.plan.outputs.version }}

  # ── release ─────────────────────────────────────────────────────────────────
  release:
    needs: [plan, build, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - name: Cache git-cliff binary
        id: cache-git-cliff-release
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/git-cliff
          key: git-cliff-${{ runner.os }}-${{ runner.arch }}

      - name: Install git-cliff
        if: steps.cache-git-cliff-release.outputs.cache-hit != 'true'
        run: cargo install git-cliff --locked

      - name: Generate changelog
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          PREV="${{ needs.plan.outputs.prev_tag }}"
          if [ -n "$PREV" ]; then
            git-cliff --strip header --tag "${TAG}" "${PREV}..${TAG}" -o changelog-release.md
          else
            git-cliff --strip header --tag "${TAG}" -o changelog-release.md
          fi
          cat changelog-release.md

      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          name: rust-crates
          path: artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.plan.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          TAG="${{ needs.plan.outputs.tag }}"
          sed "s|TAG|${TAG}|g" .github/release-header.md > release-notes.md
          cat changelog-release.md >> release-notes.md

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            artifacts/*

  # ── publish ─────────────────────────────────────────────────────────────────
  publish-npm:
    needs: [plan, release]
    uses: ./.github/workflows/publish-npm.yml
    secrets: inherit
    with:
      ref: ${{ needs.plan.outputs.tag }}
      version: ${{ needs.plan.outputs.version }}
      npm_tag: ${{ needs.plan.outputs.npm_tag }}
