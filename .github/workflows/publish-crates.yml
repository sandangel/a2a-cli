name: Package Rust crates

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to package
        required: false
        type: string
        default: ""
      version:
        description: Rust package version (e.g. 0.1.0 or 0.1.0-rc.1)
        required: true
        type: string

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Do not restore/save ~/.cargo/bin. A poisoned rust-cache entry can
          # replace cargo or rustc with Homebrew's rustup-init shim on macOS.
          cache-bin: false
          rustflags: ""

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Package crates
        run: uv run inv package-crates --version="${{ inputs.version }}"

      - uses: actions/upload-artifact@v7
        with:
          name: rust-crates
          path: |
            target/package-artifacts/*.crate
            target/package-artifacts/*.sha256
