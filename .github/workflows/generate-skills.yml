name: Generate Skills

# Auto-updates SKILL.md files whenever CLI source changes or on manual trigger.
# skills/agc/SKILL.md is derived from the binary's built-in content.
# Any flag/command/description change is reflected on next run — no manual edit needed.

on:
  push:
    branches-ignore:
      - main
    paths:
      - "agc/src/**"
  workflow_dispatch:

concurrency:
  group: generate-skills-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: "" # skill generation shouldn't fail on warnings

      - name: Build agc
        run: cargo build -p agc

      - name: Register agents (from ROVER_AGENTS_JSON repo variable)
        env:
          ROVER_AGENTS_JSON: ${{ vars.ROVER_AGENTS_JSON }}
        run: |
          [ -z "$ROVER_AGENTS_JSON" ] && exit 0
          echo "$ROVER_AGENTS_JSON" | jq -r '.[] | "\(.alias) \(.url) \(.description // "")"' | \
            while IFS=' ' read -r alias url desc; do
              [ -n "$desc" ] && ./target/debug/agc agent add "$alias" "$url" --description "$desc" \
                             || ./target/debug/agc agent add "$alias" "$url"
            done

      - name: Generate skills
        run: ./target/debug/agc generate-skills

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet skills/ && echo "changed=false" >> "$GITHUB_OUTPUT" \
                                   || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit directly (branch pushes)
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/
          git commit -m "chore: regenerate skills from CLI code + agent cards [skip ci]"
          git push

      - name: Open PR against main (schedule/dispatch)
        if: >-
          steps.diff.outputs.changed == 'true' &&
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-skills
          title: "chore: sync skills with CLI code + agent card changes"
          body: |
            Skills are out of date — possible causes:
            - CLI flags, commands, or descriptions changed
            - Agent card skills or descriptions changed
          commit-message: "chore: regenerate skills"
          add-paths: skills/
          delete-branch: true
