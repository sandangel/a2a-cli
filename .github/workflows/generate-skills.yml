name: Generate Skills

# Auto-updates SKILL.md files whenever:
#   1. CLI code changes (Go source) — skill content drifts from --help output
#   2. Agent cards change (hourly) — agent skill descriptions drift
#   3. Manual trigger
#
# agc-shared is derived from cobra metadata (same source as --help).
# Any flag/command/description change is reflected on next run — no manual edit needed.

on:
  push:
    branches-ignore:
      - main
    paths:
      - "internal/cli/*.go"
      - "internal/output/*.go"
      - "cmd/agc/*.go"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: generate-skills-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build agc
        run: go build -o bin/agc ./cmd/agc/

      - name: Register agents (from ROVER_AGENTS_JSON repo variable)
        env:
          ROVER_AGENTS_JSON: ${{ vars.ROVER_AGENTS_JSON }}
        run: |
          [ -z "$ROVER_AGENTS_JSON" ] && exit 0
          echo "$ROVER_AGENTS_JSON" | jq -r '.[] | "\(.alias) \(.url) \(.description // "")"' | \
            while IFS=' ' read -r alias url desc; do
              [ -n "$desc" ] && ./bin/agc agent add "$alias" "$url" --description "$desc" \
                             || ./bin/agc agent add "$alias" "$url"
            done

      - name: Generate skills
        run: ./bin/agc generate-skills --output-dir skills/

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet skills/ && echo "changed=false" >> "$GITHUB_OUTPUT" \
                                   || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit directly (branch pushes)
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/
          git commit -m "chore: regenerate skills from CLI code + agent cards [skip ci]"
          git push

      - name: Open PR against main (schedule/dispatch)
        if: >-
          steps.diff.outputs.changed == 'true' &&
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-skills
          title: "chore: sync skills with CLI code + agent card changes"
          body: |
            Skills are out of date — possible causes:
            - CLI flags, commands, or descriptions changed
            - Agent card skills or descriptions changed
          commit-message: "chore: regenerate skills"
          add-paths: skills/
          delete-branch: true
