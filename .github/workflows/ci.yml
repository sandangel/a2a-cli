name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache-all-crates: true
          cache-workspace-crates: true
          # Disable the default RUSTFLAGS=-D warnings: cargo passes CLI lint flags
          # to all workspace members, which would break on the read-only a2a-rs
          # submodule. Lint enforcement for a2a-cli is configured in its Cargo.toml
          # via [lints] instead.
          rustflags: ""

      - name: Clippy
        # Belt-and-suspenders: clear RUSTFLAGS at step level in case the action
        # does not honour rustflags: "" above.
        env:
          RUSTFLAGS: ""
        run: cargo clippy -p a2a-cli -p a2a-compat

      - name: Test
        run: cargo test -p a2a-cli

      - name: Rustfmt
        uses: actions-rust-lang/rustfmt@v1

      - uses: astral-sh/setup-uv@v8.1.0

      - name: YAML validation
        run: uvx pre-commit run check-yaml --all-files

  version:
    # Compute the dev version string: <cargo-version>-dev.<short-sha>
    # Only needed on main pushes (PRs don't publish).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.compute.outputs.value }}
    steps:
      - uses: actions/checkout@v6
      - id: compute
        run: |
          CARGO_VERSION=$(python3 - <<'PY'
          from pathlib import Path
          import tomllib

          for manifest in Path(".").glob("*/Cargo.toml"):
              data = tomllib.loads(manifest.read_text())
              package = data.get("package", {})
              if package.get("name") == "a2a-cli":
                  print(package["version"])
                  break
          else:
              raise SystemExit("a2a-cli package not found")
          PY
          )
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "value=${CARGO_VERSION}-dev.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build:
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build.yml
    with:
      build_env: dev
      upload_artifacts: ${{ github.event_name == 'push' }}
      attest: ${{ github.event_name == 'push' }}

  publish-npm:
    # Only publish on main pushes, not PRs.
    if: github.event_name == 'push'
    needs: [version, build]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{ needs.version.outputs.value }}
      npm_tag: dev
