name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Init submodules
        run: git submodule update --init --recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Clippy
        run: cargo clippy -p agc

      - name: Test
        run: cargo test -p agc

      - name: Rustfmt
        uses: actions-rust-lang/rustfmt@v1

      - uses: astral-sh/setup-uv@v6

      - name: YAML validation
        run: uvx pre-commit run check-yaml --all-files

  version:
    # Compute the dev version string: <cargo-version>-dev.<short-sha>
    # Only needed on main pushes (PRs don't publish).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.compute.outputs.value }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - id: compute
        run: |
          CARGO_VERSION=$(grep '^version' agc/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "value=${CARGO_VERSION}-dev.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build:
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build.yml
    with:
      build_env: dev
      upload_artifacts: ${{ github.event_name == 'push' }}
      attest: ${{ github.event_name == 'push' }}

  publish-npm:
    # Only publish on main pushes, not PRs.
    if: github.event_name == 'push'
    needs: [version, build]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{ needs.version.outputs.value }}
      npm_tag: dev
