name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache-all-crates: true
          cache-workspace-crates: true
          # Disable the default RUSTFLAGS=-D warnings: cargo passes CLI lint flags
          # to all workspace members, which would break on the read-only a2a-rs
          # submodule. Lint enforcement for a2a-cli is configured in its Cargo.toml
          # via [lints] instead.
          rustflags: ""

      - name: Clippy
        # Belt-and-suspenders: clear RUSTFLAGS at step level in case the action
        # does not honour rustflags: "" above.
        env:
          RUSTFLAGS: ""
        run: cargo clippy -p a2a-cli@0.0.0 -p a2a-compat

      - name: Test
        run: cargo test -p a2a-cli@0.0.0

      - name: Rustfmt
        uses: actions-rust-lang/rustfmt@v1

      - uses: astral-sh/setup-uv@v8.1.0

      - name: YAML validation
        run: uvx pre-commit run check-yaml --all-files

  version:
    # Compute the dev version string: <git-tag>-dev.<short-sha>
    # Only needed on main pushes (PRs don't publish).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.compute.outputs.value }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: compute
        run: |
          GIT_VERSION=$(git describe --tags --match 'v[0-9]*' --always | sed 's/^v//')
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "value=${GIT_VERSION}-dev.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build:
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build.yml
    with:
      build_env: dev
      upload_artifacts: ${{ github.event_name == 'push' }}
      attest: ${{ github.event_name == 'push' }}

  publish-npm:
    # Only publish on main pushes, not PRs.
    if: github.event_name == 'push'
    needs: [version, build]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{ needs.version.outputs.value }}
      npm_tag: dev
