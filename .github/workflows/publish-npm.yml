name: Publish npm

on:
  workflow_call:
    inputs:
      version:
        description: npm package version (e.g. 0.1.0, 0.1.0-rc.1, 0.1.0-dev.abc1234)
        required: true
        type: string
      npm_tag:
        description: npm dist-tag (latest | next | dev)
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Artifactory
        id: auth
        uses: sg-innersource/artifactory-oidc-access@v2.0.12

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://artifactory.stargate.toyota/artifactory/api/npm/rover-npm-release/
          scope: "@rover"

      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Extract binaries into platform packages
        run: |
          mkdir -p npm/packages/@rover/a2a-cli-darwin-arm64/bin
          tar xzf artifacts/a2a-aarch64-apple-darwin.tar.gz -C npm/packages/@rover/a2a-cli-darwin-arm64/bin ./a2a
          chmod +x npm/packages/@rover/a2a-cli-darwin-arm64/bin/a2a

          mkdir -p npm/packages/@rover/a2a-cli-darwin-x64/bin
          tar xzf artifacts/a2a-x86_64-apple-darwin.tar.gz -C npm/packages/@rover/a2a-cli-darwin-x64/bin ./a2a
          chmod +x npm/packages/@rover/a2a-cli-darwin-x64/bin/a2a

          mkdir -p npm/packages/@rover/a2a-cli-linux-arm64/bin
          tar xzf artifacts/a2a-aarch64-unknown-linux-gnu.tar.gz -C npm/packages/@rover/a2a-cli-linux-arm64/bin ./a2a
          chmod +x npm/packages/@rover/a2a-cli-linux-arm64/bin/a2a

          mkdir -p npm/packages/@rover/a2a-cli-linux-x64/bin
          tar xzf artifacts/a2a-x86_64-unknown-linux-gnu.tar.gz -C npm/packages/@rover/a2a-cli-linux-x64/bin ./a2a
          chmod +x npm/packages/@rover/a2a-cli-linux-x64/bin/a2a

          mkdir -p npm/packages/@rover/a2a-cli-win32-x64/bin
          unzip -j artifacts/a2a-x86_64-pc-windows-gnu.zip "*/a2a.exe" -d npm/packages/@rover/a2a-cli-win32-x64/bin/

      - name: Set version in all packages
        run: scripts/sync-npm-version "${{ inputs.version }}"

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ steps.auth.outputs.artifactory-token }}
        run: |
          NPM_TAG="${{ inputs.npm_tag }}"
          for pkg in npm/packages/@rover/a2a-cli-darwin-arm64 npm/packages/@rover/a2a-cli-darwin-x64 npm/packages/@rover/a2a-cli-linux-arm64 npm/packages/@rover/a2a-cli-linux-x64 npm/packages/@rover/a2a-cli-win32-x64; do
            npm publish "$pkg" --tag "${NPM_TAG}"
          done

      - name: Publish main package
        working-directory: npm
        run: npm publish --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ steps.auth.outputs.artifactory-token }}
