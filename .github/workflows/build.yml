name: Build

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build (default: caller ref)"
        required: false
        type: string
        default: ""
      upload_artifacts:
        description: "Upload packaged binaries as workflow artifacts"
        required: false
        type: boolean
        default: false
      attest:
        description: "Create build provenance attestation (requires id-token: write + attestations: write)"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            # Pin away from `macos-latest`; it moves between images over time.
            runner: macos-15
            archive: tar.gz
            cross: false
          - target: x86_64-apple-darwin
            # Keep Intel macOS builds on an Intel image. `macos-latest` can move
            # under us, while GitHub provides `macos-15-intel` for x64 jobs until
            # the hosted Intel macOS images are retired.
            runner: macos-15-intel
            archive: tar.gz
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: false
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-latest
            archive: zip
            cross: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""
          cache-all-crates: true
          cache-workspace-crates: true
          cache-key: ${{ matrix.target }}

      - name: Resolve Rust tools
        id: rust-tools
        run: |
          set -euo pipefail
          # Some macOS runner images can resolve `cargo`, `rustc`, or
          # ~/.cargo/bin/cargo to Homebrew's rustup-init shim. Avoid PATH and
          # rustup proxies; find the real binaries under rustup's toolchains and
          # validate their version output before using them.
          rustup_home="${RUSTUP_HOME:-$HOME/.rustup}"
          shopt -s nullglob
          cargo_candidates=(
            "${rustup_home}"/toolchains/*/bin/cargo
            "${HOME}"/.cargo/bin/cargo
            "$(command -v cargo || true)"
          )

          cargo_bin=""
          for candidate in "${cargo_candidates[@]}"; do
            if [ -x "${candidate}" ] && "${candidate}" --version 2>/dev/null | grep -q '^cargo '; then
              cargo_bin="${candidate}"
              break
            fi
          done

          if [ -z "${cargo_bin}" ]; then
            echo "::error::real cargo binary not found"
            echo "PATH=${PATH}"
            echo "RUSTUP_HOME=${RUSTUP_HOME:-}"
            echo "CARGO_HOME=${CARGO_HOME:-}"
            command -v cargo || true
            command -v rustc || true
            find "${rustup_home}" -maxdepth 4 -type f \( -name cargo -o -name rustc \) -print 2>/dev/null || true
            exit 1
          fi

          rustc_bin="$(dirname "${cargo_bin}")/rustc"
          if [ ! -x "${rustc_bin}" ] || ! "${rustc_bin}" --version 2>/dev/null | grep -q '^rustc '; then
            echo "::error::real rustc binary not found next to cargo: ${rustc_bin}"
            exit 1
          fi

          dirname "${cargo_bin}" >> "${GITHUB_PATH}"
          echo "cargo=${cargo_bin}" >> "${GITHUB_OUTPUT}"
          echo "rustc=${rustc_bin}" >> "${GITHUB_OUTPUT}"
          "${rustc_bin}" --version --verbose
          "${cargo_bin}" --version
        shell: bash

      - name: Cache cross binary
        if: matrix.cross == true
        id: cache-cross
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cross
          key: cross-0.2.5-${{ runner.os }}-${{ runner.arch }}

      - name: Install cross
        if: matrix.cross == true && steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          cargo_bin="${{ steps.rust-tools.outputs.cargo }}"
          "$cargo_bin" install cross --locked --version 0.2.5

      - name: Build
        env:
          # Mount only the registry/git caches (not the full cargo home) so
          # Swatinem/rust-cache's downloads are reused inside the Docker
          # container without triggering flock() failures on the GHA filesystem.
          CROSS_CONTAINER_OPTS: >-
            --volume /home/runner/.cargo/registry:/root/.cargo/registry
            --volume /home/runner/.cargo/git:/root/.cargo/git
        run: |
          cargo_bin="${{ steps.rust-tools.outputs.cargo }}"
          cross_bin="${CARGO_HOME:-$HOME/.cargo}/bin/cross"
          "$cargo_bin" --version

          if [ "${{ matrix.cross }}" = "true" ]; then
            "$cross_bin" build --release --target ${{ matrix.target }} -p 'a2a-protocol-cli' --locked
          else
            "$cargo_bin" build --release --target ${{ matrix.target }} -p 'a2a-protocol-cli' --locked
          fi
        shell: bash

      - name: Package (unix)
        if: inputs.upload_artifacts && matrix.archive == 'tar.gz'
        run: |
          ARTIFACT="a2a-${{ matrix.target }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/a2a" staging/
          cp LICENSE README.md staging/
          tar czf "${ARTIFACT}.tar.gz" -C staging .
          shasum -a 256 "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
        shell: bash

      - name: Package (windows)
        if: inputs.upload_artifacts && matrix.archive == 'zip'
        run: |
          ARTIFACT="a2a-${{ matrix.target }}"
          mkdir -p "${ARTIFACT}"
          cp "target/${{ matrix.target }}/release/a2a.exe" "${ARTIFACT}/"
          cp LICENSE README.md "${ARTIFACT}/"
          zip -r "${ARTIFACT}.zip" "${ARTIFACT}/"
          shasum -a 256 "${ARTIFACT}.zip" > "${ARTIFACT}.zip.sha256"
        shell: bash

      - name: Attest
        if: inputs.attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: a2a-${{ matrix.target }}.${{ matrix.archive }}

      - uses: actions/upload-artifact@v7
        if: inputs.upload_artifacts
        with:
          name: binary-${{ matrix.target }}
          path: |
            a2a-${{ matrix.target }}.${{ matrix.archive }}
            a2a-${{ matrix.target }}.${{ matrix.archive }}.sha256
