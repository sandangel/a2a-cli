repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]   # allow custom tags used in GitHub Actions workflows

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: ["-p", "a2a-cli", "-p", "a2a-compat", "--", "--check"]
        pass_filenames: false
      - id: clippy
        args: ["-p", "a2a-cli@0.2.0", "-p", "a2a-compat", "--no-deps", "--", "-D", "warnings"]
